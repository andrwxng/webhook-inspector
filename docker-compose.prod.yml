# Production stack for a single VM: app + Postgres + Redis + Caddy
# (automatic HTTPS via Let's Encrypt). Only Caddy is exposed to the host;
# Postgres and Redis are reachable solely on the compose network — unlike
# docker-compose.yml (local dev), which publishes their ports.
#
# Configuration comes from a .env file next to this one on the server:
#   DOMAIN, POSTGRES_PASSWORD, and optionally GITHUB_CLIENT_ID/SECRET.
#
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      PORT: '3000'
      DATABASE_URL: postgres://webhook:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/webhook_inspector
      REDIS_URL: redis://redis:6379
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/healthz']
      interval: 15s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: webhook
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: webhook_inspector
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U webhook -d webhook_inspector']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  caddy_data:
  caddy_config:
